version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: vgl_app:staging
    container_name: vgl_app_staging
    restart: unless-stopped
    ports:
      - "8081:80"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vgl_network

  db:
    image: mysql:8.0
    container_name: vgl_db_staging
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - vgl_db_staging:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./sql/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${DB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vgl_network

volumes:
  vgl_db_staging:

networks:
  vgl_network:
    driver: bridge